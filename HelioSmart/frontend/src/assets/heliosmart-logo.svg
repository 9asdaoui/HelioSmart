<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f2440"/>
    </linearGradient>
  </defs>
  <!-- Sun icon -->
  <circle cx="30" cy="30" r="12" fill="url(#sunGrad)"/>
  <!-- Sun rays -->
  <g stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round">
    <line x1="30" y1="8" x2="30" y2="3"/>
    <line x1="30" y1="57" x2="30" y2="52"/>
    <line x1="8" y1="30" x2="3" y2="30"/>
    <line x1="57" y1="30" x2="52" y2="30"/>
    <line x1="14.4" y1="14.4" x2="10.9" y2="10.9"/>
    <line x1="49.1" y1="49.1" x2="45.6" y2="45.6"/>
    <line x1="14.4" y1="45.6" x2="10.9" y2="49.1"/>
    <line x1="49.1" y1="10.9" x2="45.6" y2="14.4"/>
  </g>
  <!-- Panel on sun -->
  <rect x="23" y="25" width="14" height="9" rx="1" fill="#1e3a5f" opacity="0.8"/>
  <line x1="27" y1="25" x2="27" y2="34" stroke="#8899aa" stroke-width="0.5" opacity="0.6"/>
  <line x1="33" y1="25" x2="33" y2="34" stroke="#8899aa" stroke-width="0.5" opacity="0.6"/>
  <line x1="23" y1="28" x2="37" y2="28" stroke="#8899aa" stroke-width="0.5" opacity="0.6"/>
  <line x1="23" y1="31" x2="37" y2="31" stroke="#8899aa" stroke-width="0.5" opacity="0.6"/>
  <!-- Helio text -->
  <text x="68" y="38" font-family="Inter, sans-serif" font-weight="800" font-size="28" fill="url(#textGrad)">Helio</text>
  <!-- Smart text -->
  <text x="148" y="38" font-family="Inter, sans-serif" font-weight="800" font-size="28" fill="url(#sunGrad)">Smart</text>
</svg>
