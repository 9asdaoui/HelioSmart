<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" preserveAspectRatio="none">
  <defs>
    <!-- Deep blue monocrystalline cell gradient -->
    <linearGradient id="cellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2744;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1a2f4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#162440;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle reflection shimmer -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0);stop-opacity:0" />
      <stop offset="45%" style="stop-color:rgba(255,255,255,0.08);stop-opacity:1" />
      <stop offset="55%" style="stop-color:rgba(255,255,255,0.12);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Panel frame (dark aluminum) -->
  <rect x="0" y="0" width="100" height="60" rx="1" ry="1" fill="#2c2c2c" />
  <!-- Inner cell area -->
  <rect x="2" y="2" width="96" height="56" fill="url(#cellGrad)" />
  <!-- Cell grid lines (silver busbars) -->
  <!-- Vertical lines (6 cells across) -->
  <line x1="18" y1="2" x2="18" y2="58" stroke="#8899aa" stroke-width="0.5" opacity="0.6"/>
  <line x1="34" y1="2" x2="34" y2="58" stroke="#8899aa" stroke-width="0.5" opacity="0.6"/>
  <line x1="50" y1="2" x2="50" y2="58" stroke="#8899aa" stroke-width="0.5" opacity="0.6"/>
  <line x1="66" y1="2" x2="66" y2="58" stroke="#8899aa" stroke-width="0.5" opacity="0.6"/>
  <line x1="82" y1="2" x2="82" y2="58" stroke="#8899aa" stroke-width="0.5" opacity="0.6"/>
  <!-- Horizontal lines (3 rows) -->
  <line x1="2" y1="21" x2="98" y2="21" stroke="#8899aa" stroke-width="0.5" opacity="0.6"/>
  <line x1="2" y1="40" x2="98" y2="40" stroke="#8899aa" stroke-width="0.5" opacity="0.6"/>
  <!-- Thin finger lines (horizontal, within cells) -->
  <line x1="2" y1="8" x2="98" y2="8" stroke="#6677" stroke-width="0.2" opacity="0.3"/>
  <line x1="2" y1="14" x2="98" y2="14" stroke="#6677" stroke-width="0.2" opacity="0.3"/>
  <line x1="2" y1="27" x2="98" y2="27" stroke="#6677" stroke-width="0.2" opacity="0.3"/>
  <line x1="2" y1="34" x2="98" y2="34" stroke="#6677" stroke-width="0.2" opacity="0.3"/>
  <line x1="2" y1="46" x2="98" y2="46" stroke="#6677" stroke-width="0.2" opacity="0.3"/>
  <line x1="2" y1="52" x2="98" y2="52" stroke="#6677" stroke-width="0.2" opacity="0.3"/>
  <!-- Shimmer overlay for glass reflection -->
  <rect x="2" y="2" width="96" height="56" fill="url(#shimmer)" />
</svg>
