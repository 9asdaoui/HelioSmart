version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: heliosmart-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: heliosmart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend (Development mode with hot reload)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: heliosmart-backend-dev
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/heliosmart
      SECRET_KEY: heliosmart-dev-secret-key
      ALGORITHM: HS256
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:5174
      APP_NAME: HelioSmart
      APP_VERSION: 1.0.0
      DEBUG: "True"
      PY_SERVICE_URL: http://host.docker.internal:8889
      OLLAMA_URL: http://heliosmart-ollama-dev:11434
      OLLAMA_MODEL: llama3.2:3b
      # HuggingFace cache — persists Whisper & sentence-transformers models across restarts
      HF_HOME: /hf_cache
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./backend:/app
      - hf_cache:/hf_cache
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # React Frontend (Development mode with Vite)
  frontend:
    image: node:18-alpine
    container_name: heliosmart-frontend-dev
    restart: unless-stopped
    working_dir: /app
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
      - DOCKER_ENV=true
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: heliosmart-ollama-dev
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q llama || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
    driver: local
  hf_cache:
    driver: local
  ollama_data:
    external: true
    name: mediassist_ollama_data

networks:
  default:
    name: heliosmart-network-dev
